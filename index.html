.B{

.N{
color:yellow;
}

.G{
color:green;
}

color:cyan;
}

#currentCall{
font-size:25px;
font-weight:bold;
}

.marked{

color:white;

#currentCall{

font-size:35px;
font-weight:bold;

width:60px;
height:60px;

margin:10px auto;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:#222;

border:2px solid white;

box-shadow:0 0 8px white;

linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url("YOUR_GAME_ROOM_IMAGE_LINK");

<script>
  
const firebaseConfig = {
  apiKey: "AIzaSyC39N7doWt-pmfr-obfuqP54TRvb4FB8rc",
  authDomain: "za-bingo.firebaseapp.com",
  databaseURL: "https://za-bingo-default-rtdb.firebaseio.com",
  projectId: "za-bingo",
  storageBucket: "za-bingo.firebasestorage.app",
  messagingSenderId: "766799040123",
  appId: "1:766799040123:web:c6f7e93dd30569df375cde"
};




var db; 
 
firebase.initializeApp(firebaseConfig);

db = firebase.database();  

let selectedCartelas = [];

let currentStake = 0;

let autoMarkEnabled = true;

let gameBanned = false;

// Fixed Cartelas (we keep these forever)

let fixedCartelas = {};


// CREATE 150 FIXED CARTELAS

function generateFixedCartelas(){

for(let c=1;c<=150;c++){


let B=[];
let I=[];
let N=[];
let G=[];
let O=[];



for(let i=1;i<=15;i++){
B.push(i);
I.push(i+15);
N.push(i+30);
G.push(i+45);
O.push(i+60);
}



function pick(arr,count){

let result=[];

let copy=[...arr];


while(result.length<count){

let index=Math.floor(Math.random()*copy.length);

result.push(copy[index]);

copy.splice(index,1);

}

return result;

}



let b = pick(B,5);
let i = pick(I,5);
let n = pick(N,5);
let g = pick(G,5);
let o = pick(O,5);


let card = [

b[0], i[0], n[0], g[0], o[0],
b[1], i[1], n[1], g[1], o[1],
b[2], i[2], n[2], g[2], o[2],
b[3], i[3], n[3], g[3], o[3],
b[4], i[4], n[4], g[4], o[4]

];


card[12]="*";


// Put FREE center

card[12]="*";


fixedCartelas[c]=card;


}


}


// run once

generateFixedCartelas();




// Screen control

function showScreen(id){

document.querySelectorAll(".screen").forEach(function(screen){

screen.classList.remove("active");

});


document.getElementById(id).classList.add("active");

}




function openGameRoom(){

showScreen("gameRoom");

}



function backHome(){

showScreen("screen1");

}



function backGameRoom(){

showScreen("gameRoom");

}





// Open room and show 150 cartelas

function openRoom(room){

showScreen(room);


if(db){

db.ref("ZA_Bingo_V3/rooms/"+room).update({

status:"waiting",

stake: currentStake,

prizepool:0,

countdown:25,

lastCall:""

});

}

if(db){

db.ref("ZA_Bingo_V3/rooms/"+room+"/takenCartelas").on("value",function(snapshot){

window.takenCartelas = snapshot.val() || {};

});

}


if(room=="room5"){

createCartelas("cartela5");

}


if(room=="room10"){

createCartelas("cartela10");

}


if(room=="room20"){

createCartelas("cartela20");

}

if(db){

db.ref("ZA_Bingo_V3/rooms/"+room+"/countdown").on("value",function(snapshot){

let time = snapshot.val();

if(time !== null){

document.getElementById("countdown").innerHTML = time;

}

});

}

}





function createCartelas(id){


let box=document.getElementById(id);


box.innerHTML="";


selectedCartelas=[];



for(let i=1;i<=150;i++){


let btn=document.createElement("button");


btn.innerHTML=i;



btn.onclick=function(){

if(window.takenCartelas && window.takenCartelas[i]){

alert("Cartela already taken");

return;

}

if(btn.classList.contains("selected")){


btn.classList.remove("selected");


selectedCartelas =
selectedCartelas.filter(x=>x!=i);


}


else{


if(selectedCartelas.length < 2){


btn.classList.add("selected");


selectedCartelas.push(i);


}

else{


alert("Maximum 2 Cartelas");


}


}


};



box.appendChild(btn);



}


}


function lockCartelas(){

let buttons = document.querySelectorAll(".cartelaGrid button");

buttons.forEach(function(btn){

btn.disabled = true;

});

}



// Start game

function lockCartelas(){

let buttons = document.querySelectorAll(".cartelaGrid button");

buttons.forEach(function(btn){

btn.disabled = true;

});

}

function startGame(stake){
  
gameBanned = false;



if(db){

let playerID = "player_" + Date.now();


db.ref("ZA_Bingo_V3/rooms/room" + stake + "/players/" + playerID).set({

cartelas: selectedCartelas,

status: "playing"

});

selectedCartelas.forEach(function(card){

db.ref("ZA_Bingo_V3/rooms/room" + stake + "/takenCartelas/" + card)
.set(true);

});

}

if(selectedCartelas.length==0){

alert("Choose Cartela first");

return;

}



currentStake = stake;

let playerID = localStorage.getItem("playerID");

if(!playerID){

playerID = "player_" + Date.now();

localStorage.setItem("playerID", playerID);

}

localStorage.setItem("playerID", playerID);

showScreen("waitingScreen");

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/players").on("value",function(snapshot){

let count = snapshot.numChildren();

document.getElementById("playerCount").innerHTML = count+"/150";


if(count >= 2){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/status")
.once("value",function(statusSnap){


if(statusSnap.val()=="countdown" || statusSnap.val()=="playing"){

return;

}


db.ref("ZA_Bingo_V3/rooms/room"+stake+"/status")
.set("countdown");


let time = 25;


db.ref("ZA_Bingo_V3/rooms/room"+stake+"/countdown")
.set(time);


let timer=setInterval(function(){


time--;


db.ref("ZA_Bingo_V3/rooms/room"+stake+"/countdown")
.set(time);



if(time <= 0){

clearInterval(timer);

lockCartelas();

// LOCK ROOM HERE

db.ref("ZA_Bingo_V3/rooms/room"+stake).update({

status:"playing",

locked:true

});


openGameScreen();

}


},1000);



});


}

else{

document.getElementById("countdown").innerHTML = "Waiting for player...";

}

});

let players = 100;


let total = stake * players;


let prize = total - (total * 0.15);



document.getElementById("playerCount").innerHTML =
players+"/150";

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/players").on("value",function(snapshot){

let count = snapshot.numChildren();

document.getElementById("playerCount").innerHTML =
count+"/150";

document.getElementById("gamePlayers").innerHTML =
count+"/150";

});

}

document.getElementById("prize").innerHTML =
prize;

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/winner").set("");

}

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/countdown").set(25);

}



}







function openGameScreen(){


showScreen("gameScreen");



document.getElementById("gamePlayers").innerHTML =
document.getElementById("playerCount").innerHTML;



document.getElementById("gamePrize").innerHTML =
document.getElementById("prize").innerHTML;



createBingoCards();

listenToCalledNumbers();

setTimeout(function(){
startRoomCaller();
},1000);

}


let calledNumbers = [];

let callerTimer;

function startRoomCaller(){

let room = "room" + currentStake;

db.ref("ZA_Bingo_V3/rooms/" + room + "/caller")
.once("value", function(snapshot){


if(snapshot.val() == true){

return;

}


// become the caller

db.ref("ZA_Bingo_V3/rooms/" + room + "/caller")
.set(true);


db.ref("ZA_Bingo_V3/rooms/" + room + "/calledNumbers")
.set([]);


startCaller();


});

}

function listenToCalledNumbers(){

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+currentStake+"/calledNumbers")
.on("value",function(snapshot){

let numbers = snapshot.val();

if(numbers){

calledNumbers = numbers;

document.getElementById("calledNumbers").innerHTML =
calledNumbers.join("<br>");

let number = calledNumbers[calledNumbers.length-1];

document.getElementById("currentCall").innerHTML = number;

autoMark(number);

}

});

}

}

function startCaller(){


calledNumbers=[];

document.getElementById("calledNumbers").innerHTML="";



callerTimer=setInterval(function(){


if(calledNumbers.length>=75){

clearInterval(callerTimer);
return;

}



let number;


do{

number=Math.floor(Math.random()*75)+1;

}while(calledNumbers.includes(number));



calledNumbers.push(number);

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+currentStake+"/calledNumbers")
.set(calledNumbers);

}

let letter;


if(number<=15){
letter="B";
}
else if(number<=30){
letter="I";
}
else if(number<=45){
letter="N";
}
else if(number<=60){
letter="G";
}
else{
letter="O";
}


document.getElementById("currentCall").className=letter;

document.getElementById("currentCall").innerHTML = number;


document.getElementById("calledNumbers").innerHTML +=
"<div class='calledNumber "+letter+"'>"+letter+" "+number+"</div>";

autoMark(number);

document.getElementById("calledNumbers").innerHTML =
calledNumbers.join("<br>");



},3000);


}




function createBingoCards(){

let area=document.getElementById("bingoCard");

area.innerHTML="";


selectedCartelas.forEach(function(number){


let card=fixedCartelas[number];


if(card){


let container=document.createElement("div");

container.className="cardContainer";



let title=document.createElement("h3");

title.innerHTML="Cartela "+number;

container.appendChild(title);



let letters=document.createElement("div");

letters.className="bingoLetters";

letters.innerHTML=
"<span>B</span>"+
"<span>I</span>"+
"<span>N</span>"+
"<span>G</span>"+
"<span>O</span>";

container.appendChild(letters);




let grid=document.createElement("div");

grid.className="singleCard";



card.forEach(function(value){


let box=document.createElement("div");

box.innerHTML=value;


if(value=="*"){

box.classList.add("freeBox");

}

box.onclick=function(){

box.classList.toggle("marked");

};


grid.appendChild(box);


});



container.appendChild(grid);


area.appendChild(container);



}


});


}

function autoMark(number){

if(!autoMarkEnabled){
return;
}


let boxes=document.querySelectorAll(".singleCard div");


boxes.forEach(function(box){

if(box.innerHTML == number){

box.classList.add("marked");

}

});

}

function toggleAutoMark(){

autoMarkEnabled = !autoMarkEnabled;


if(autoMarkEnabled){

document.getElementById("autoBtn").innerHTML =
"AUTO MARK: ON";

}

else{

document.getElementById("autoBtn").innerHTML =
"AUTO MARK: OFF";

}

}

function claimBingo(){
  
if(gameBanned){

alert("You are banned from this game");

return;

}  

let cards=document.querySelectorAll(".singleCard");


let winner=false;


cards.forEach(function(card){

let boxes=card.querySelectorAll("div");


let values=[];


boxes.forEach(function(box){

let value = box.innerHTML;


if(value=="*"){

values.push(true);

}

else if(
box.classList.contains("marked") &&
calledNumbers.includes(Number(value))
){

values.push(true);

}

else{

values.push(false);

}

});


// Check rows

for(let r=0;r<5;r++){

let win=true;

for(let c=0;c<5;c++){

if(!values[r*5+c]){

win=false;

}

}

if(win){

winner=true;

}

}


// Check columns

for(let c=0;c<5;c++){

let win=true;

for(let r=0;r<5;r++){

if(!values[r*5+c]){

win=false;

}

}

if(win){

winner=true;

}

}


// Diagonal 1

if(values[0]&&values[6]&&values[12]&&values[18]&&values[24]){

winner=true;

}


// Diagonal 2

if(values[4]&&values[8]&&values[12]&&values[16]&&values[20]){

winner=true;

}


// Corners

if(values[0]&&values[4]&&values[20]&&values[24]){

winner=true;

}


});


if(winner){

clearInterval(callerTimer);


document.getElementById("winnerName").innerHTML =
"Player: You";


document.getElementById("winnerCartela").innerHTML =
"Cartela: " + selectedCartelas.join(", ");


document.getElementById("winnerPrize").innerHTML =
"Prize: " + document.getElementById("gamePrize").innerHTML + " Br";


showScreen("winnerPopup");


setTimeout(function(){

resetRoom(currentStake);

resetGame();

},4000);

}

else{

gameBanned = true;

showScreen("invalidPopup");


setTimeout(function(){

gameBanned = false;

showScreen("screen1");

},3000);


}


}

function resetRoom(stake){

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake).update({

status:"waiting",
countdown:25,
lastCall:""

});


db.ref("ZA_Bingo_V3/rooms/room"+stake+"/players").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/takenCartelas").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/calledNumbers").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/winner").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/caller").remove();

}

}

function resetGame(){

selectedCartelas=[];

calledNumbers=[];

gameBanned=false;

showScreen("screen1");

}



</script>

</h2>

</h2>

<h2 id="winnerPrize">
</h2>

</div>

</h2>
