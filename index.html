<script>
  
const firebaseConfig = {
  apiKey: "AIzaSyC39N7doWt-pmfr-obfuqP54TRvb4FB8rc",
  authDomain: "za-bingo.firebaseapp.com",
  databaseURL: "https://za-bingo-default-rtdb.firebaseio.com",
  projectId: "za-bingo",
  storageBucket: "za-bingo.firebasestorage.app",
  messagingSenderId: "766799040123",
  appId: "1:766799040123:web:c6f7e93dd30569df375cde"
};




var db; 
 
firebase.initializeApp(firebaseConfig);

db = firebase.database();  
loadFixedCartelas();
watchRoomButtons();

loadWalletBalance();
let selectedCartelas = [];

let currentStake = 0;

let autoMarkEnabled = true;

let gameBanned = false;

let depositMethod = "";

// Fixed Cartelas (we keep these forever)

let fixedCartelas = {};


// CREATE 150 FIXED CARTELAS

function generateFixedCartelas(){

for(let c=1;c<=150;c++){


let B=[];
let I=[];
let N=[];
let G=[];
let O=[];



for(let i=1;i<=15;i++){
B.push(i);
I.push(i+15);
N.push(i+30);
G.push(i+45);
O.push(i+60);
}



function pick(arr,count){

let result=[];

let copy=[...arr];


while(result.length<count){

let index=Math.floor(Math.random()*copy.length);

result.push(copy[index]);

copy.splice(index,1);

}

return result;

}



let b = pick(B,5);
let i = pick(I,5);
let n = pick(N,5);
let g = pick(G,5);
let o = pick(O,5);


let card = [

b[0], i[0], n[0], g[0], o[0],
b[1], i[1], n[1], g[1], o[1],
b[2], i[2], n[2], g[2], o[2],
b[3], i[3], n[3], g[3], o[3],
b[4], i[4], n[4], g[4], o[4]

];


card[12]="*";


// Put FREE center

card[12]="*";


fixedCartelas[c]=card;


}


}


// LOAD FIXED CARTELAS FROM FIREBASE

function loadFixedCartelas(){

db.ref("ZA_Bingo_V3/cartelas").once("value",function(snapshot){

if(snapshot.exists()){

fixedCartelas = snapshot.val();

console.log("Cartelas loaded");

}

else{

generateFixedCartelas();

db.ref("ZA_Bingo_V3/cartelas").set(fixedCartelas);

console.log("New cartelas saved");

}

});

}

function watchRoomButtons(){

let rooms = [
{room:"room5", btn:"room5Btn", name:"ባለ 5"},
{room:"room10", btn:"room10Btn", name:"ባለ 10"},
{room:"room20", btn:"room20Btn", name:"ባለ 20"}
];


rooms.forEach(function(item){


db.ref("ZA_Bingo_V3/rooms/"+item.room).on("value",function(snapshot){


let data = snapshot.val();

let button = document.getElementById(item.btn);


if(!button || !data){
return;
}



if(data.status=="countdown"){

button.innerHTML =
"⏳ "+item.name+
"<br>Starts in: "+
(data.countdown || 0)+"s";


}


else if(data.status=="playing"){


button.innerHTML =
"🔒 "+item.name+
"<br>GAME RUNNING";


}


else{


button.innerHTML =
item.name+
"<br>Stake "+item.room.replace("room","")+" Br";


}


});


});


}


// Screen control

function loadWalletBalance(){

if(window.Telegram && Telegram.WebApp){

Telegram.WebApp.ready();

let tgUser = Telegram.WebApp.initDataUnsafe.user;


if(tgUser){


let telegramID = tgUser.id;


// Find phone using telegram_lookup

db.ref("telegram_lookup/" + telegramID).once("value",function(snapshot){


let data = snapshot.val();


if(!data){

alert("Account not found. Please register with the bot first.");

return;

}


let phone = data.phone;


// Save player ID for game use

localStorage.setItem("playerID", phone);


// Load balance

db.ref("players/" + phone + "/balance")
.on("value",function(balanceSnap){


let balance = balanceSnap.val();


if(balance == null){

balance = 0;

}


document.getElementById("balance").innerHTML =
Number(balance).toFixed(2);


});


});


}

}

}

function showScreen(id){

document.querySelectorAll(".screen").forEach(function(screen){

screen.classList.remove("active");

});


document.getElementById(id).classList.add("active");

}

function showRoomMessage(){

showScreen("roomMessage");

}

function submitDeposit(){

let playerID = localStorage.getItem("playerID");

let amount = Number(
document.getElementById("depositAmount").value
);

let sms = document.getElementById("depositSMS").value;


if(!amount || !sms){

alert("Enter amount and SMS");

return;

}


let depositID = "DEP_" + Date.now();


db.ref("ZA_Bingo_V3/deposits/" + depositID).set({

playerID: playerID,

amount: amount,

method: depositMethod,

sms: sms,

status:"pending",

time: Date.now()

});


alert("Deposit submitted. Waiting approval");


document.getElementById("depositAmount").value="";
document.getElementById("depositSMS").value="";


}

function openDeposit(){

showScreen("depositScreen");

}
function selectDepositMethod(method){

depositMethod = method;

alert(method + " selected");

}

function approveDeposit(depositID){

db.ref("ZA_Bingo_V3/deposits/" + depositID).once("value",function(snapshot){

let deposit = snapshot.val();

if(!deposit){
alert("Deposit not found");
return;
}


let playerID = deposit.playerID;
let amount = deposit.amount;


// Update deposit status

db.ref("ZA_Bingo_V3/deposits/" + depositID).update({

status:"approved"

});


// Add balance

db.ref("players/" + playerID + "/balance")
.transaction(function(balance){

return (balance || 0) + amount;

});


alert("Deposit approved");

});


}

function openWithdraw(){

showScreen("withdrawScreen");

}

function openGameRoom(){

showScreen("gameRoom");

}



function backHome(){

showScreen("screen1");

}



function backGameRoom(){

showScreen("gameRoom");

}





// Open room and show 150 cartelas

function openRoom(room){

db.ref("ZA_Bingo_V3/rooms/"+room+"/status").once("value",function(snapshot){

let status = snapshot.val();


if(status=="playing"){

showRoomMessage();
return;

}


showScreen(room);


if(db){

db.ref("ZA_Bingo_V3/rooms/"+room).update({

status:"waiting",

stake: Number(room.replace("room","")),

prizepool:0,

countdown:25,

lastCall:""

});

}

if(db){

db.ref("ZA_Bingo_V3/rooms/"+room+"/takenCartelas").on("value",function(snapshot){

window.takenCartelas = snapshot.val() || {};

});

}


if(room=="room5"){

createCartelas("cartela5");

}


if(room=="room10"){

createCartelas("cartela10");

}


if(room=="room20"){

createCartelas("cartela20");

}

if(db){

db.ref("ZA_Bingo_V3/rooms/"+room+"/countdown").on("value",function(snapshot){
  
  db.ref("ZA_Bingo_V3/rooms/"+room+"/status").on("value",function(snapshot){

let status = snapshot.val();


if(status=="playing"){

lockCartelas();

document.getElementById("cancelBtn").style.display="none";

}

});

let time = snapshot.val();

if(time !== null){

document.getElementById("countdown").innerHTML = time;

}

});

}

});
}





function createCartelas(id){


let box=document.getElementById(id);


box.innerHTML="";


selectedCartelas=[];



for(let i=1;i<=150;i++){


let btn=document.createElement("button");


btn.innerHTML=i;



btn.onclick=function(){

if(window.takenCartelas && window.takenCartelas[i]){

alert("Cartela already taken");

return;

}

if(btn.classList.contains("selected")){


btn.classList.remove("selected");


selectedCartelas =
selectedCartelas.filter(x=>x!=i);


}


else{


if(selectedCartelas.length < 2){


btn.classList.add("selected");


selectedCartelas.push(i);


}

else{


alert("Maximum 2 Cartelas");


}


}


};



box.appendChild(btn);



}


}






// Start game

function lockCartelas(){

let buttons = document.querySelectorAll(".cartelaGrid button");

buttons.forEach(function(btn){

btn.disabled = true;

});

}

function startGame(stake){

currentStake = stake;

gameBanned = false;



let playerID = localStorage.getItem("playerID");


if(window.Telegram && Telegram.WebApp){

    Telegram.WebApp.ready();

    let tgUser = Telegram.WebApp.initDataUnsafe.user;

    if(tgUser){

        db.ref("telegram_lookup/" + tgUser.id).once("value", function(snapshot){

            if(snapshot.exists()){

                playerID = snapshot.val().phone;

                localStorage.setItem("playerID", playerID);

            }

        });

    }

}


if(!playerID){

playerID = "player_" + Date.now();

localStorage.setItem("playerID", playerID);

}

// Save player account

db.ref("players/" + playerID).update({

lastSeen: Date.now()

});

if(selectedCartelas.length==0){

alert("Choose Cartela first");

return;

}

// CHECK BALANCE BEFORE JOINING

db.ref("players/" + playerID + "/balance").once("value", function(balanceSnap){

let balance = balanceSnap.val() || 0;


if(balance < stake){

alert("Insufficient balance");

return;

}


// Deduct stake safely

db.ref("players/" + playerID + "/balance").transaction(function(balance){

    if(balance === null){
        return 0;
    }

    if(balance < stake){
        return;
    }

    return balance - stake;

}, function(error, committed){

    if(error){
        alert("Balance error");
        return;
    }

    if(!committed){
        alert("Insufficient balance");
        return;
    }


    // Continue joining room

    db.ref("ZA_Bingo_V3/rooms/room" + stake + "/players/" + playerID).set({

        cartelas: selectedCartelas,

        status:"playing"

    });
selectedCartelas.forEach(function(card){

db.ref("ZA_Bingo_V3/rooms/room" + stake + "/takenCartelas/" + card)
.set(true);

});

});




});









showScreen("waitingScreen");

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/players").on("value",function(snapshot){

let count = snapshot.numChildren();

document.getElementById("playerCount").innerHTML = count+"/150";


if(count >= 2){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/status")
.once("value",function(statusSnap){

if(statusSnap.val()=="countdown" || statusSnap.val()=="playing"){
return;
}


db.ref("ZA_Bingo_V3/rooms/room"+stake).update({

status:"countdown",
countdown:25

});


let time = 25;


let timer=setInterval(function(){

time--;


db.ref("ZA_Bingo_V3/rooms/room"+stake+"/countdown")
.set(time);


if(time <= 0){

clearInterval(timer);


db.ref("ZA_Bingo_V3/rooms/room"+stake).update({

status:"playing",
locked:true,
countdown:0

});

document.getElementById("cancelBtn").style.display="none";

lockCartelas();

openGameScreen();

}


},1000);


});
}

else{

document.getElementById("countdown").innerHTML = "Waiting for player...";

}

});



if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/players").on("value",function(snapshot){

let count = snapshot.numChildren();

let totalCartelas = 0;


snapshot.forEach(function(player){

let data = player.val();


if(data.cartelas){

totalCartelas += data.cartelas.length;

}

});


let totalMoney = totalCartelas * stake;


let prize = totalMoney - (totalMoney * 0.15);



document.getElementById("playerCount").innerHTML =
count+"/150";


document.getElementById("gamePlayers").innerHTML =
count+"/150";


document.getElementById("prize").innerHTML =
prize.toFixed(2);


document.getElementById("gamePrize").innerHTML =
prize.toFixed(2);


});

}



if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/winner").set("");

}

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/countdown").set(25);

}



}

function cancelCountdown(){

if(currentStake==0){
return;
}


db.ref("ZA_Bingo_V3/rooms/room"+currentStake+"/players")
.once("value",function(snapshot){


let players = snapshot.val();


for(let id in players){

if(players[id].cartelas.join(",")==selectedCartelas.join(",")){


let refund = currentStake;


// give stake back

db.ref("players/"+id+"/balance")
.transaction(function(balance){

return (balance || 0) + refund;

});


// remove player from room

db.ref("ZA_Bingo_V3/rooms/room"+currentStake+"/players/"+id)
.remove();


}

}


});


selectedCartelas.forEach(function(card){

db.ref("ZA_Bingo_V3/rooms/room"+currentStake+"/takenCartelas/"+card)
.remove();

});


selectedCartelas=[];


showScreen("room"+currentStake);


createCartelas("cartela"+currentStake);


}


function createCallGrid(){

let grid = document.getElementById("callGrid");

grid.innerHTML = "";


let columns = [
["B",1],
["I",16],
["N",31],
["G",46],
["O",61]
];


// headers

columns.forEach(function(col){

let head=document.createElement("div");

head.className="callBox";

head.innerHTML=col[0];

grid.appendChild(head);

});


// numbers

for(let row=0; row<15; row++){

columns.forEach(function(col){

let number = col[1] + row;


let box=document.createElement("div");

box.className="callBox";

box.id="call_"+number;

box.innerHTML=number;


grid.appendChild(box);

});

}

}


function openGameScreen(){

showScreen("gameScreen");

createCallGrid();



document.getElementById("gamePlayers").innerHTML =
document.getElementById("playerCount").innerHTML;



document.getElementById("gamePrize").innerHTML =
document.getElementById("prize").innerHTML;



createBingoCards();

listenToCalledNumbers();

setTimeout(function(){
startRoomCaller();
},1000);

}


let calledNumbers = [];

let callerTimer;

function listenToCalledNumbers(){

let room = "room" + currentStake;


db.ref("ZA_Bingo_V3/rooms/" + room + "/calledNumbers")
.on("value",function(snapshot){

calledNumbers = snapshot.val() || [];


if(calledNumbers.length > 0){

let number = calledNumbers[calledNumbers.length-1];


let letter;


if(number<=15){
letter="B";
}
else if(number<=30){
letter="I";
}
else if(number<=45){
letter="N";
}
else if(number<=60){
letter="G";
}
else{
letter="O";
}


document.getElementById("currentCall").className = letter;

document.getElementById("currentCall").innerHTML =
letter+" "+number;


let box=document.getElementById("call_"+number);

if(box){
box.classList.add("called");
}


}

});

}

function startRoomCaller(){

let room = "room" + currentStake;


db.ref("ZA_Bingo_V3/rooms/" + room + "/caller")
.transaction(function(current){

if(current){
    return;
}

return {
    player: localStorage.getItem("playerID"),
    time: Date.now()
};

}, function(error, committed){


if(committed){

db.ref("ZA_Bingo_V3/rooms/" + room + "/calledNumbers")
.once("value",function(snapshot){

if(!snapshot.exists()){

db.ref("ZA_Bingo_V3/rooms/" + room + "/calledNumbers")
.set([]);

}


startCaller();


});


}


});


}

function startCaller(){

let room = "room" + currentStake;


db.ref("ZA_Bingo_V3/rooms/" + room + "/calledNumbers")
.once("value",function(snapshot){


calledNumbers = snapshot.val() || [];


callerTimer=setInterval(function(){


if(calledNumbers.length >= 75){

clearInterval(callerTimer);

return;

}



let number;


do{

number = Math.floor(Math.random()*75)+1;


}while(calledNumbers.includes(number));



calledNumbers.push(number);
document.getElementById("callCountGame").innerHTML = calledNumbers.length;


db.ref("ZA_Bingo_V3/rooms/" + room + "/calledNumbers")
.set(calledNumbers);



let letter;


if(number<=15){
letter="B";
}
else if(number<=30){
letter="I";
}
else if(number<=45){
letter="N";
}
else if(number<=60){
letter="G";
}
else{
letter="O";
}



document.getElementById("currentCall").className = letter;

document.getElementById("currentCall").innerHTML =
letter + " " + number;


autoMark(number);



},3000);



});


}



function createBingoCards(){

let area=document.getElementById("bingoCard");

area.innerHTML="";


selectedCartelas.forEach(function(number){


let card=fixedCartelas[number];


if(card){


let container=document.createElement("div");

container.className="cardContainer";



let title=document.createElement("h3");

title.innerHTML="Cartela "+number;

container.appendChild(title);



let letters=document.createElement("div");

letters.className="bingoLetters";

letters.innerHTML=
"<span>B</span>"+
"<span>I</span>"+
"<span>N</span>"+
"<span>G</span>"+
"<span>O</span>";

container.appendChild(letters);




let grid=document.createElement("div");

grid.className="singleCard";



card.forEach(function(value){


let box=document.createElement("div");

box.innerHTML=value;


if(value=="*"){

box.classList.add("freeBox");

}

box.onclick=function(){

box.classList.toggle("marked");

};


grid.appendChild(box);


});



container.appendChild(grid);


area.appendChild(container);



}


});


}

function autoMark(number){

if(!autoMarkEnabled){
return;
}


let boxes=document.querySelectorAll(".singleCard div");


boxes.forEach(function(box){

let value = box.innerHTML;

if(Number(value) == number){

box.classList.add("marked");

}

});

}

function toggleAutoMark(){

autoMarkEnabled = !autoMarkEnabled;


if(autoMarkEnabled){

document.getElementById("autoBtn").innerHTML =
"AUTO MARK: ON";

}

else{

document.getElementById("autoBtn").innerHTML =
"AUTO MARK: OFF";

}

}

function claimBingo(){
  
if(gameBanned){

alert("You are banned from this game");

return;

}  

let cards=document.querySelectorAll(".singleCard");


let winner=false;


cards.forEach(function(card){

let boxes=card.querySelectorAll("div");


let values=[];


boxes.forEach(function(box){

let value = box.innerHTML;


if(value=="*"){

values.push(true);

}

else if(
box.classList.contains("marked") &&
calledNumbers.includes(Number(value))
){

values.push(true);

}

else{

values.push(false);

}

});


// Check rows

for(let r=0;r<5;r++){

let win=true;

for(let c=0;c<5;c++){

if(!values[r*5+c]){

win=false;

}

}

if(win){

winner=true;

}

}


// Check columns

for(let c=0;c<5;c++){

let win=true;

for(let r=0;r<5;r++){

if(!values[r*5+c]){

win=false;

}

}

if(win){

winner=true;

}

}


// Diagonal 1

if(values[0]&&values[6]&&values[12]&&values[18]&&values[24]){

winner=true;

}


// Diagonal 2

if(values[4]&&values[8]&&values[12]&&values[16]&&values[20]){

winner=true;

}


// Corners

if(values[0]&&values[4]&&values[20]&&values[24]){

winner=true;

}


});


if(winner){

clearInterval(callerTimer);


// CHECK WINNER IN FIREBASE

let room = "room" + currentStake;

let playerID = localStorage.getItem("playerID");


db.ref("ZA_Bingo_V3/rooms/"+room+"/winner")
.transaction(function(currentWinner){

if(currentWinner){

return;

}

return playerID;


}, function(error, committed){


if(committed){


// Calculate prize directly from Firebase

db.ref("ZA_Bingo_V3/rooms/" + room + "/players").once("value", function(snapshot){

    let totalCartelas = 0;

    snapshot.forEach(function(player){

        let data = player.val();

        if(data.cartelas){
            totalCartelas += data.cartelas.length;
        }

    });

    let totalMoney = totalCartelas * currentStake;
    let prize = totalMoney - (totalMoney * 0.15);

    db.ref("players/" + playerID + "/balance").transaction(function(balance){

        return (balance || 0) + prize;

    }, function(error, committed){

        if(error || !committed){
            alert("Failed to pay winner.");
            return;
        }

        document.getElementById("winnerName").innerHTML =
        "Player: You";

        document.getElementById("winnerCartela").innerHTML =
        "Cartela: " + selectedCartelas.join(", ");

        document.getElementById("winnerPrize").innerHTML =
        "Prize: " + prize.toFixed(2) + " Br";

        showScreen("winnerPopup");

        setTimeout(function(){

            resetRoom(currentStake);
            resetGame();

        }, 4000);

    });

});


}


});




}

else{

gameBanned = true;

showScreen("invalidPopup");


setTimeout(function(){

gameBanned = false;

showScreen("screen1");

},3000);


}


}

function resetRoom(stake){

if(db){

db.ref("ZA_Bingo_V3/rooms/room"+stake).update({

status:"waiting",
countdown:25,
lastCall:"",
locked:false

});


db.ref("ZA_Bingo_V3/rooms/room"+stake+"/players").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/takenCartelas").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/calledNumbers").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/winner").remove();

db.ref("ZA_Bingo_V3/rooms/room"+stake+"/caller").remove();

}

}

function resetGame(){

selectedCartelas=[];

calledNumbers=[];

gameBanned=false;

showScreen("screen1");

}
